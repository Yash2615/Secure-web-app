<!DOCTYPE html>
<html>
<head>
    <title>SecureVault</title>
    <style>
        body { font-family: Arial; background: #1a1a2e; color: #eee; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: #16213e; padding: 30px; border-radius: 10px; }
        input, textarea { width: 100%; padding: 10px; margin: 8px 0; background: #0f3460; color: #eee; border: 1px solid #e94560; border-radius: 5px; }
        button { background: #e94560; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
        .error { color: #e94560; }
        nav { margin-bottom: 20px; }
        nav a { color: #e94560; margin-right: 15px; text-decoration: none; }
    </style>
</head>
<body>
<div class="container">
    {% block content %}{% endblock %}
</div>
</body>
</html>
